name: Code Quality & Coverage

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  quality-check:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Type Check
        id: typecheck
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run Linter
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Build Application
        id: build
        run: npm run build
        continue-on-error: true

      - name: Generate Coverage Report
        id: coverage
        run: |
          if npm run | grep -q "test:coverage"; then
            npm run test:coverage
          else
            echo "::error::Missing required npm script: test:coverage"
            exit 1
          fi

      - name: Install Functions dependencies
        id: functions_install
        run: npm ci --prefix backend/functions
        continue-on-error: true

      - name: Run Functions tests
        id: functions_tests
        run: npm run test:functions
        continue-on-error: true

      - name: Calculate Code Statistics
        id: stats
        run: |
          echo "Calculating code statistics..."

          # Count TypeScript/JavaScript files
          TS_FILES=$(find . -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" | grep -v node_modules | grep -v .next | grep -v dist | wc -l)

          # Count lines of code
          LOC=$(find . \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) ! -path "*/node_modules/*" ! -path "*/.next/*" ! -path "*/dist/*" -exec cat {} \; | wc -l)

          echo "files=$TS_FILES" >> $GITHUB_OUTPUT
          echo "loc=$LOC" >> $GITHUB_OUTPUT

      - name: Comment PR with Quality Report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;

            const typecheckOutcome = '${{ steps.typecheck.outcome }}';
            const lintOutcome = '${{ steps.lint.outcome }}';
            const buildOutcome = '${{ steps.build.outcome }}';
            const coverageOutcome = '${{ steps.coverage.outcome }}';
            const functionsTestsOutcome = '${{ steps.functions_tests.outcome }}';

            const files = '${{ steps.stats.outputs.files }}';
            const loc = '${{ steps.stats.outputs.loc }}';

            const getStatus = (outcome) => {
              if (outcome === 'success') return '✅ Passed';
              if (outcome === 'failure') return '❌ Failed';
              if (outcome === 'skipped') return '⏸️ Skipped';
              return '⚠️ Warning';
            };

            const allPassed = typecheckOutcome === 'success' &&
                             lintOutcome === 'success' &&
                             buildOutcome === 'success' &&
                             coverageOutcome === 'success' &&
                             functionsTestsOutcome === 'success';

            const comment = `## 📊 Code Quality Report

            **Overall Status:** ${allPassed ? '✅ All checks passed!' : '⚠️ Some checks need attention'}

            ### Quality Checks

            | Check | Status | Description |
            |-------|--------|-------------|
            | **TypeScript** | ${getStatus(typecheckOutcome)} | Type checking and compilation |
            | **Linter** | ${getStatus(lintOutcome)} | Code style and best practices |
            | **Build** | ${getStatus(buildOutcome)} | Production build verification |
            | **Coverage** | ${getStatus(coverageOutcome)} | Test coverage analysis |
            | **Functions Tests** | ${getStatus(functionsTestsOutcome)} | Backend functions Jest test suite |

            ### Code Statistics

            - 📁 **Files:** ${files} TypeScript/JavaScript files
            - 📝 **Lines of Code:** ${loc.toLocaleString()}

            ### Recommendations

            ${allPassed ? 
              '✨ Great work! All quality checks are passing.' : 
              '⚠️ Please review the failed checks above and address any issues.'}

            ---
            *Generated by Code Quality workflow*`;

            try {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: owner,
                repo: repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not comment on PR:', error.message);
            }
